spring.application.name=minimarket

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ─────────────────────────────────────────────
# JWT — Configuración de seguridad del token
# ─────────────────────────────────────────────
# Clave secreta: inyectada por variable de entorno en producción.
# En local se usa el fallback. Mínimo 32 caracteres para HMAC-SHA256.
jwt.secret=${JWT_SECRET:EstaEsUnaClaveLocalDeDesarrolloMuySeguraParaMinimarket2024}

# Expiración del token (en milisegundos).
# Política de sesión por nivel de sensibilidad:
#   - GERENTE  → 4 horas  (240 min) → acceso a datos críticos, sesión corta
#   - EMPLEADO → 8 horas  (480 min) → jornada laboral estándar
#   - CLIENTE  → 24 horas (1440 min) → experiencia de compra continua
#
# NOTA: Esta aplicación usa un único token compartido por rol.
# Para expiración diferenciada real, generarToken(userDetails, rol)
# debería recibir el rol y leer el valor correspondiente de estas props.
# Por ahora se usa el valor de GERENTE como mínimo denominador común
# (máxima restricción de seguridad).
#
# Comportamiento ante token expirado: el filtro JwtAuthFilter descarta
# la autenticación y Spring Security responde con HTTP 401.
# No existe renovación automática: el cliente debe autenticarse de nuevo.
jwt.expiration=${JWT_EXPIRATION:14400000}

# ─────────────────────────────────────────────
# CORS — Orígenes permitidos
# ─────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}
